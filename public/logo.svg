<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for favicon -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" />
  
  <!-- Equipment rental symbol (construction equipment) -->
  <g transform="translate(100, 100)">
    <!-- Simplified excavator bucket -->
    <path d="M -25 -15 L 25 -15 L 20 15 L -20 15 Z" fill="white" opacity="0.95" />
    
    <!-- Bucket teeth -->
    <rect x="-18" y="12" width="6" height="8" fill="white" opacity="0.9" />
    <rect x="-6" y="12" width="6" height="8" fill="white" opacity="0.9" />
    <rect x="6" y="12" width="6" height="8" fill="white" opacity="0.9" />
    
    <!-- Arm -->
    <line x1="-25" y1="-10" x2="-35" y2="-25" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />
    
    <!-- Connection point -->
    <circle cx="-25" cy="-10" r="3" fill="white" opacity="0.9" />
    <circle cx="-35" cy="-25" r="3" fill="white" opacity="0.9" />
  </g>
  
  <!-- Text alternative for better readability at small sizes -->
  <text x="100" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="white" opacity="0.9" font-family="Arial, sans-serif">MRP</text>
</svg>